<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Finn &amp; Jake — платформер</title>
<style>
  html,body{margin:0;height:100%;background:#0c1424;overflow:hidden;
            font-family:"Segoe UI",Arial,sans-serif;
            -webkit-user-select:none;user-select:none;
            -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;
            overscroll-behavior:none;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:12px;}
  canvas{background:#000;border-radius:14px;
         box-shadow:0 22px 70px rgba(0,0,0,.6);
         max-width:98vw;max-height:86vh;}
  .hint{color:#9fb3c8;font-size:14px;text-align:center;}
  .hint b{color:#ffd34d;}
  .hint .k{display:inline-block;padding:1px 7px;border:1px solid #3a4a60;
           border-radius:6px;background:#172638;color:#dbe7f3;margin:0 1px;}
  /* экранное управление - включается классом "touch" на body */
  #touch{position:fixed;inset:0;z-index:10;pointer-events:none;display:none;}
  body.touch #touch{display:block;}
  body.touch .hint{display:none;}   /* на touch прячем подсказки клавиатуры */
  .btn{position:fixed;pointer-events:auto;touch-action:none;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:bold;font-family:"Segoe UI",Arial,sans-serif;
    background:rgba(10,22,40,0.40);border:2px solid rgba(255,255,255,0.55);
    border-radius:16px;text-shadow:0 1px 2px #000;}
  .btn.round{border-radius:50%;}
  .btn.on{background:rgba(85,200,255,0.45);border-color:#fff;}
  #bLeft {left:calc(20px + env(safe-area-inset-left));bottom:calc(24px + env(safe-area-inset-bottom));width:88px;height:88px;font-size:40px;}
  #bRight{left:calc(120px + env(safe-area-inset-left));bottom:calc(24px + env(safe-area-inset-bottom));width:88px;height:88px;font-size:40px;}
  #bJump {right:calc(24px + env(safe-area-inset-right));bottom:calc(24px + env(safe-area-inset-bottom));width:110px;height:110px;font-size:20px;}
  #bSwap {right:calc(36px + env(safe-area-inset-right));bottom:calc(150px + env(safe-area-inset-bottom));width:88px;height:60px;font-size:16px;}
  #bUp   {left:calc(69px + env(safe-area-inset-left));bottom:calc(120px + env(safe-area-inset-bottom));width:90px;height:90px;font-size:18px;}</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>
  <div class="hint">
    <span class="k">←</span><span class="k">→</span> или <span class="k">A</span><span class="k">D</span> — идти&nbsp; •&nbsp;
    <span class="k">Space</span>/<span class="k">↑</span>/<span class="k">W</span> — прыжок&nbsp; •&nbsp;
    <span class="k">X</span> — сменить персонажа&nbsp; •&nbsp;<span class="k">Space</span> &mdash; удар
  </div>
</div>

<div id="touch">
  <div id="bLeft"  class="btn round" data-k="ArrowLeft">&#9664;</div>
  <div id="bRight" class="btn round" data-k="ArrowRight">&#9654;</div>
  <div id="bJump"  class="btn round" data-k="Space">МЕЧ</div>
  <div id="bSwap"  class="btn"       data-k="KeyX">СМЕНА</div>
  <div id="bUp"    class="btn round" data-k="ArrowUp">ПРЫЖОК</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

// --- debug-watch: watch({mw}) или watch('имя',значение); значения рисуются внизу экрана ---
let _watch = {}, _watchN = 0;
function watch(a, b){
  if(a && typeof a==='object' && !Array.isArray(a)) Object.assign(_watch, a);   // watch({mw, foo})
  else if(typeof a==='string') _watch[a] = b;                                    // watch('mw', mw)
  else _watch['#'+(_watchN++)] = a;                                              // watch(mw) — без имени
}
const OUTLINE = '#23272e';   // тёмный контур, как на референсе
let OUTLINE_W = 2.0;       // толщина чёрной обводки персонажей

// горизонтальный сдвиг стопы по фазе шага: мах — дуга вперёд, опора — линейно назад
// (на опоре стопа идёт назад с постоянной скоростью = скорости тела → не скользит)
function footX(ph, stride){
  const T2=Math.PI*2; ph=((ph%T2)+T2)%T2;
  if(ph<Math.PI) return -Math.cos(ph)*stride;          // мах (нога поднята)
  return stride*(1 - 2*(ph-Math.PI)/Math.PI);          // опора (нога на земле): линейно назад
}

// ---------- мелкие помощники рисования ----------
function rrPath(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function fillRR(x,y,w,h,r,color){ rrPath(x,y,w,h,r); ctx.fillStyle=color; ctx.fill(); }
function circle(x,y,r,color){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill(); }

// контурные примитивы для персонажей (обводка как в мультфильме)
function bodyRR(x,y,w,h,r,color,oc){ rrPath(x,y,w,h,r); if(oc){ctx.lineWidth=OUTLINE_W;ctx.strokeStyle=oc;ctx.stroke();} ctx.fillStyle=color; ctx.fill(); }
// как bodyRR, но верхняя и нижняя грань — дуги, выгнутые вниз; curve = глубина прогиба по центру
function archRR(x,y,w,h,r,curve,color,oc){
  r=Math.min(r,w/2,h/2);
  const x2=x+w, y2=y+h, cxm=x+w/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.quadraticCurveTo(cxm, y+curve*2, x2-r, y);     // верхняя грань — дуга вниз
  ctx.arcTo(x2,y,x2,y+r,r);
  ctx.lineTo(x2,y2-r);
  ctx.arcTo(x2,y2,x2-r,y2,r);
  ctx.quadraticCurveTo(cxm, y2+curve*2, x+r, y2);    // нижняя грань — дуга вниз
  ctx.arcTo(x,y2,x,y2-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if(oc){ ctx.lineWidth=OUTLINE_W; ctx.strokeStyle=oc; ctx.stroke(); }
  ctx.fillStyle=color; ctx.fill();
}
function blob(x,y,r,color,oc,sy){ sy=sy||1; ctx.beginPath(); ctx.ellipse(x,y,r,r*sy,0,0,Math.PI*2); if(oc){ctx.lineWidth=OUTLINE_W;ctx.strokeStyle=oc;ctx.stroke();} ctx.fillStyle=color; ctx.fill(); }
// прямоугольник с двумя ушками-прямоугольниками единым силуэтом; flip=true → ушки снизу (для шорт)
function capRR(x,y,w,h,r,color,oc,flip,earR, dist, ang1, ang2){
  if(dist==null) dist=0.9;                                // доля ширины для ушей (0.9 = у углов); у шорт колеблется при ходьбе
  ang1=ang1||0; ang2=ang2||0;                             // наклон каждого ушка (штанины) — следует за ногой/прыжком
  const e1=x+w* (1 - dist), e2=x+w*dist, ey=flip?y+h:y;   // 0.18/0.82 — уши ближе к углам (было 0.25/0.75)
  const ew=earR*1.7, poke=earR*1.5, inset=earR*2.0, er=earR*0.6;   // размеры ушка
  const eyTop=flip?ey-inset:ey-poke, ehh=poke+inset;               // ушко сидит на кромке
  // скруглённый прямоугольник как подпуть (по часовой — для единого силуэта без дыр)
  const sub=(rx,ry,rw,rh,rr)=>{
    rr=Math.min(rr,rw/2,rh/2);
    ctx.moveTo(rx+rr,ry);
    ctx.arcTo(rx+rw,ry,rx+rw,ry+rh,rr);
    ctx.arcTo(rx+rw,ry+rh,rx,ry+rh,rr);
    ctx.arcTo(rx,ry+rh,rx,ry,rr);
    ctx.arcTo(rx,ry,rx+rw,ry,rr);
    ctx.closePath();
  };
  // ушко-штанина с наклоном вокруг точки крепления (cx,ey) на кромке
  const earSub=(cx,ang)=>{ ctx.save(); ctx.translate(cx,ey); ctx.rotate(ang); ctx.translate(-cx,-ey); sub(cx-ew/2,eyTop,ew,ehh,er); ctx.restore(); };
  ctx.beginPath();
  sub(x,y,w,h,r);                          // корпус
  earSub(e1, ang1);                        // ушко-штанина 1 (наклон от ноги)
  earSub(e2, ang2);                        // ушко-штанина 2 (наклон от ноги)
  if(oc){ ctx.lineWidth=OUTLINE_W; ctx.strokeStyle=oc; ctx.stroke(); }
  ctx.fillStyle=color; ctx.fill();         // заливка поверх скрывает внутренние швы
}
// «резиновая» конечность: дуга от сустава к концу с заданным изгибом + обводка
function limb(jx,jy,ex,ey,bend,w,color,oc){
  const dx=ex-jx, dy=ey-jy, L=Math.hypot(dx,dy)||1, nx=-dy/L, ny=dx/L;
  const cx=(jx+ex)/2+nx*bend, cy=(jy+ey)/2+ny*bend;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(jx,jy); ctx.quadraticCurveTo(cx,cy,ex,ey);
  if(oc){ ctx.lineWidth=w+OUTLINE_W; ctx.strokeStyle=oc; ctx.stroke(); }
  ctx.lineWidth=w; ctx.strokeStyle=color; ctx.stroke();
}
// рука из двух цветов: рукав c1 сверху + кожа c2 снизу; та же кривая, делится в точке split, контур цельный
function limb2(jx,jy,ex,ey,bend,w,c1,c2,oc,split){
  const dx=ex-jx, dy=ey-jy, L=Math.hypot(dx,dy)||1, nx=-dy/L, ny=dx/L;
  const cx=(jx+ex)/2+nx*bend, cy=(jy+ey)/2+ny*bend;       // контрольная точка кривой
  const t=split;
  const ax=jx+(cx-jx)*t, ay=jy+(cy-jy)*t;                 // де Кастельжо: A
  const bx=cx+(ex-cx)*t, by=cy+(ey-cy)*t;                 // B
  const mx=ax+(bx-ax)*t, my=ay+(by-ay)*t;                 // точка раздела на кривой
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(jx,jy); ctx.quadraticCurveTo(cx,cy,ex,ey);   // цельный контур всей руки
  ctx.lineWidth=w+OUTLINE_W; ctx.strokeStyle=oc; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my); ctx.quadraticCurveTo(bx,by,ex,ey);   // низ — кожа
  ctx.lineWidth=w; ctx.strokeStyle=c2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(jx,jy); ctx.quadraticCurveTo(ax,ay,mx,my);   // верх — рукав (поверх, круглый манжет)
  ctx.lineWidth=w; ctx.strokeStyle=c1; ctx.stroke();
}

// ---------- мир ----------
const LEVEL_W = 3600;
const GROUND_BASE = H*0.80;

// высота поверхности (где стоят ноги) в мировой координате x
function terrain(x){
  return GROUND_BASE
       - Math.sin(x*0.0016+0.4)*46
       - Math.sin(x*0.0041+1.3)*24
       - Math.sin(x*0.011 +0.2)*12;
}
function midHill(x){ return H*0.60 - Math.sin(x*0.008+2.0)*40 - Math.sin(x*0.006+0.7)*18; }
function farHill(x){ return H*0.55 - Math.sin(x*0.005+0.9)*34 - Math.sin(x*0.004+2.5)*16; }

let camX = 0, camTargetX = 0, T = 0;

// облака
const clouds = [];
for(let i=0;i<6;i++){
  const s=0.6+Math.random()*0.8, lobes=[];
  const n=3+(Math.random()*3|0);                       // 3-5 нижних долей
  const xs=[]; let lx=0;
  for(let k=0;k<n;k++){ xs.push(lx); lx += 15+Math.random()*11; }
  const mid=lx/2;
  const midK=(n-1)/2;
  for(let k=0;k<n;k++){                                 // нижний ряд (низ выровнен → плоское дно)
    const edgeF = 1 - 0.5*(midK ? Math.abs(k-midK)/midK : 0);   // доли меньше по краям (1 в центре, 0.5 на концах)
    const rx=(22+Math.random()*9)*edgeF, ry=rx*(0.78+Math.random()*0.2);
    lobes.push({dx:xs[k]-mid, dy:2-ry, rx, ry});
  }
  const tn=1+(Math.random()*2|0);                       // 1-2 верхних бугра (высота, разнообразие)
  for(let k=0;k<tn;k++){
    const rx=11+Math.random()*8;
    lobes.push({dx:(-0.4+Math.random()*0.8)*mid, dy:-6-Math.random()*9, rx, ry:rx*0.85});
  }
  clouds.push({x:Math.random()*W, y:24+Math.random()*120, s, spd:8+Math.random()*16, lobes});
}

// трава: пучки из трёх параллельных тёмно-зелёных полосок, разбросаны по всей плоскости земли
const grass=[];
for(let i=0;i<50;i++){
  const gx=Math.random()*LEVEL_W, top=terrain(gx)+5;
  grass.push({x:gx, y:top+Math.random()*(H-top-3), size:0.7+Math.random()*0.4});
}

// ---------- персонажи ----------
function makeChar(type,x){
  return {
    type, x, y:terrain(x), vx:0, vy:0, grounded:true, facing:1,
    walk:0, moving:0, land:0, atk:0, afterAtk:0, atkHit:false, atkType:1,
    stepLen: 15,                        // длина шага: фаза привязана к пути → стопа не скользит (Джейк теперь тоже)
    speed: type==='finn'?100:115,
    jumpV: type==='finn'?670:710,
    name:  type==='finn'?'Финн':'Джейк'
  };
}
let finn = makeChar('finn',300);
let jake = makeChar('jake',225);
let leader = finn, follower = jake;
let bananas = [];                    // враги: зомби-бананы, бегут влево через экран
let bananaTimer = 0.6;
const BANANA_STRIDE = 6;             // длина шага зомби (локальная) — для бега без проскальзывания
function bananaColor(){ const r=180+(Math.random()*42|0), g=190+(Math.random()*42|0), b=55+(Math.random()*60|0); return 'rgb('+r+','+g+','+b+')'; }
function spawnBanana(){
  const x = camX + W + 30 + Math.random()*70;                 // за правым краем видимости
  bananas.push({ type:'banana', x, y:terrain(x), facing:-1, walk:Math.random()*6, moving:1, grounded:true,
                 scale: 1.5 * (0.8+Math.random()*0.45), color: bananaColor(), speed: 70+Math.random()*70 });
}

let pieces=[], juice=[];             // половинки разрубленных зомби + брызги сока
let drips=[], stink=[];              // зелёные капли изо рта и коричнево-зелёный пар (вонь) зомби
function spawnJuice(x,y,scale){
  const n=22+(Math.random()*10|0);
  for(let i=0;i<n;i++){ const a=Math.random()*6.283, sp=50+Math.random()*200;
    juice.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-300, r:(0.2+Math.random()*1.6)*Math.min(scale,1.8), life:0.45+Math.random()*0.55 }); }
}
function cutZombie(b){
  const cy=b.y-32*b.scale;           // линия разреза (середина тела)
  pieces.push({ half:'top',    x:b.x, y:cy, vx:-160+Math.random()*40, vy:-300-Math.random()*100, rot:0, rotV:-4-Math.random()*10, scale:b.scale, color:b.color, life:3 });
  pieces.push({ half:'bottom', x:b.x, y:cy, vx: -10+Math.random()*40, vy:-160-Math.random()*80,  rot:0, rotV: 4+Math.random()*9, scale:b.scale, color:b.color, life:3 });
  spawnJuice(b.x, cy, b.scale);
}
function drawZombieHalf(p){
  const body=p.color, OUT=OUTLINE;
  ctx.save();
  ctx.translate(p.x-camX, p.y); ctx.rotate(p.rot); ctx.scale(p.scale,p.scale);
  const ow=OUTLINE_W; OUTLINE_W=ow/p.scale;                 // обводка не масштабируется
  ctx.save();
  ctx.beginPath();
  if(p.half==='top') ctx.rect(-30,-40,60,40); else ctx.rect(-30,0,60,44);   // оставить только свою половину
  ctx.clip();
  ctx.translate(0,32);                                       // система стоп -> разрез в 0
  roundTopRR(-12,-58,24,46,12, body, OUT);
  if(p.half==='bottom'){ limb(-6,-18,-7,2,-2,2,body,OUT); limb(6,-18,7,2,2,2,body,OUT); }
  ctx.restore();
  if(p.half==='top'){
    ctx.translate(0,32);
    blob(2,-50,1,'#00с000',null); blob(9,-50,1,'#00с000',null);
   // ctx.strokeStyle=OUT; ctx.lineWidth=1.5/p.scale; ctx.lineCap='round';
   // ctx.beginPath(); ctx.moveTo(1,-40); ctx.lineTo(4,-37); ctx.lineTo(7,-40); ctx.lineTo(10,-37); ctx.stroke();
  }
  OUTLINE_W=ow;
  ctx.restore();
}
function drawStink(s){
  const sx=s.x-camX, a=Math.min(0.4, s.life*0.42);
  const cy=s.y + s.r*0.35;                                    // центр плотности ниже середины -> таяние кверху
  const g=ctx.createRadialGradient(sx, cy, s.r*0.12, sx, cy, s.r*1.2);
  g.addColorStop(0,   'rgba(106,112,56,'+a.toFixed(3)+')');   // плотный низ-центр
  g.addColorStop(0.6, 'rgba(106,112,56,'+(a*0.55).toFixed(3)+')');
  g.addColorStop(1,   'rgba(106,112,56,0)');                  // края и верх — в прозрачность
  ctx.save(); ctx.beginPath(); ctx.arc(sx, s.y, s.r, 0, 6.283); ctx.fillStyle=g; ctx.fill(); ctx.restore();
}
function drawJuice(j){
  ctx.save(); ctx.globalAlpha=Math.min(1,j.life*2.2);
  ctx.beginPath(); ctx.arc(j.x-camX, j.y, j.r, 0, 6.283); ctx.fillStyle='#4ff02e'; ctx.fill();
  ctx.restore();
}
const GRAV = 2100;
const ATK_DUR = 0.22;   // длительность взмаха меча (сек)
const AFTER_DUR = 0.14; // длительность возврата меча в стойку (сек)
function stepChar(c,intent,dt){
  if(intent.move!==0) c.facing=intent.move;
  c.vx = intent.move*c.speed;
  c.x = clamp(c.x + c.vx*dt, 20, LEVEL_W-20);

  if(intent.jump && c.grounded){ c.vy=-c.jumpV; c.grounded=false; }
  const wasAtk = (c.atk||0) > 0;
  c.atk = Math.max(0, (c.atk||0) - dt);                               // таймер взмаха меча
  if(intent.attack && c.type==='finn'){ c.atkType = 1 - (c.atkType||0); c.atk = ATK_DUR; c.afterAtk = 0; c.atkHit=false; }  // удар; нажатие во время c.atk>0 -> следующий тип (чередуются)
  else if(wasAtk && c.atk<=0) {
    c.afterAtk = 1;                         // удар закончился -> возврат меча в стойку
  }
  else if (c.atk<=0) {
    c.afterAtk = Math.max(0, (c.afterAtk||0) - dt/AFTER_DUR);      // возврат затухает 1 -> 0
    c.atkType = 1
  }
  c.vy += GRAV*dt;
  c.y += c.vy*dt;

  const g = terrain(c.x);
  const wasGround = c.grounded;
  // приклеивание к склону: на спуске не отрываемся от земли (иначе поза земля/воздух мерцает)
  if(c.y>=g || (wasGround && c.vy>=0 && g-c.y<=12)){ c.y=g; c.vy=0; c.grounded=true; }
  else c.grounded=false;
  if(c.grounded && !wasGround) c.land = 1;          // момент приземления
  c.land = Math.max(0, c.land - dt*6);

  const tgt = (Math.abs(c.vx)>5 && c.grounded)?1:0;
  c.moving += (tgt-c.moving)*Math.min(1,dt*12);
  if(tgt){
    if(c.stepLen) c.walk += Math.abs(c.vx)*dt*Math.PI/(2*c.stepLen);  // фаза по пройденному пути → нет проскальзывания
    else c.walk += dt*9*(Math.abs(c.vx)/c.speed + 0.4);
  }
}

// намерение игрока (ведущий)
const keys={}; let justPressed={};
function leaderIntent(){
  let move=0;
  if(keys['ArrowLeft'] ||keys['KeyA']) move-=1;
  if(keys['ArrowRight']||keys['KeyD']) move+=1;
  const jump = justPressed['ArrowUp']||justPressed['KeyW'];
  const attack = justPressed['Space'];
  return {move,jump,attack};
}

// намерение напарника (идёт следом)
function followIntent(self,lead){
  const targetX = lead.x - lead.facing*52;   // встать чуть позади ведущего
  const dx = targetX - self.x;
  let move = 0;
  if(dx>14) move=1; else if(dx<-14) move=-1;

  // совсем рядом — стоим и смотрим на ведущего
  if(Math.abs(lead.x-self.x)<40){ move=0; self.facing=Math.sign(lead.x-self.x)||self.facing; }

  let jump=false;
  if(self.grounded){
    if(move!==0 && terrain(self.x+move*26) < terrain(self.x)-26) jump=true;     // крутой подъём впереди
    if(lead.y < self.y-50 && Math.abs(dx)<170) jump=true;                       // ведущий заметно выше
  }
  return {move,jump};
}

// ---------- персонажи: рисование ----------
// Финн — тонкие конечности, голова-скруглённый прямоугольник
// меч: рукоять в (hx,hy), клинок направлен вдоль угла ang (экранные коорд, +x вперёд)
function drawSword(hx,hy,ang,atk, lenK){
  ctx.save();
  ctx.translate(hx,hy); ctx.rotate(ang);
  ctx.lineCap='round';
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(1,0); ctx.stroke();
  ctx.strokeStyle='#6b4a2b'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(1,0); ctx.stroke();  // рукоять
  bodyRR(-1,-7,3,16,1,'#dbe2ec',OUTLINE);                    // гарда (крестовина)
  perspective = atk <= 0 ? 0 : (0.5 - atk) * 4 
  ctx.beginPath();                                           // клинок
  ctx.moveTo(2,-3.2); ctx.lineTo(54 * lenK,-3.2 - perspective); ctx.lineTo(60 * lenK,0); ctx.lineTo(54 * lenK,3.2 + perspective); ctx.lineTo(2,3.2); ctx.closePath();
  ctx.lineWidth=OUTLINE_W; ctx.strokeStyle=OUTLINE; ctx.stroke(); ctx.fillStyle='#dbe2ec'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(4,0); ctx.lineTo(26,0); ctx.lineWidth=1; ctx.strokeStyle='#aeb8c6'; ctx.stroke();  // дол
  ctx.restore();
}
function drawFinn(c, isLeader){
  const skin='#f6cfa3', shirt='#3fa3d0', shorts='#2f63b0', hat='#fbfdff',
        sock='#ffffff', shoe='#23262e', OUT=OUTLINE;
  const p=c.walk, mv=c.moving, air=c.grounded?0:1;
  const stride=c.stepLen*mv, lift=7*mv, asw=8*mv;
  const hipY=-28,  shY=-62, shX=14;
  hipX=10.5;

  let blx,bly, flx,fly, bax,bay, fax,fay, baBend, faBend, blBend, flBend, blPlant, flPlant;
  if(air){
    hipX = hipX + 2
    const LEG=15, ARM=31;                                  // натуральные длины — конечности не укорачиваются
    const tb=-0.7, tf=0.5;                                 // углы ног в прыжке (от вертикали вниз)
    blx=-hipX+LEG*Math.sin(tb) + 2; bly=hipY+LEG*Math.cos(tb)+13;
    flx= hipX+LEG*Math.sin(tf); fly=hipY+LEG*Math.cos(tf)+7;
    const ab=-2.7, af=2.7;                                 // руки вверх-в стороны, полной длины
    bax=-shX+ARM*Math.sin(ab); bay=shY-ARM*Math.cos(ab);
    fax= shX+ARM*Math.sin(af); fay=shY-ARM*Math.cos(af);
    baBend=-3; faBend=3; blBend=-5; flBend=-10;             // колени согнуты
    blPlant=0; flPlant=0;                                  // в воздухе стопы идут по ноге
  }else{
    blx=-hipX+footX(p,stride);             bly=-Math.max(0,Math.sin(p))*lift;
    flx= hipX+footX(p+Math.PI,stride);     fly=-Math.max(0,Math.sin(p+Math.PI))*lift;
    bly += terrain(c.x + c.facing*blx) - c.y + 5;   // ставим стопу на реальную землю под ней (наклон)
    fly += terrain(c.x + c.facing*flx) - c.y + 5;
    // руки — маятник в противофазе ногам; +x = по ходу движения
    const sb= Math.cos(p)*asw;             // мах дальней руки (вперёд при p=0)
    const sf=-Math.cos(p)*asw;             // ближней руки (противофаза)
    bax=-shX-1+sb;  bay=-30 - Math.max(0,sb)*0.45;     // руки длиннее на 25% (было -41)
    fax= shX+1+sf;  fay=-30 - Math.max(0,sf)*0.45;
    baBend = sb*0.25;                      // локоть отстаёт за махом
    faBend = sf*0.25;
    blBend = -4 - 5*mv*Math.max(0,Math.sin(p));           // колено сильнее сгибается в фазе подъёма
    flBend = -4 - 5*mv*Math.max(0,Math.sin(p+Math.PI));
    blPlant = 1 - clamp(Math.max(0,Math.sin(p))*lift/4, 0, 1);          // 1 = стопа на земле, 0 = в махе
    flPlant = 1 - clamp(Math.max(0,Math.sin(p+Math.PI))*lift/4, 0, 1);
  }

  // меч двумя руками у управляемого Финна: стойка либо удар сверху вниз (по c.atk)
  let swordAng=0, gripX=0, gripY=0;

  if(isLeader){
    if(c.atk>0){                                                 // взмах: занос над головой -> удар сверху вниз
      const ap=1-c.atk/ATK_DUR, L=(u,v)=>u+(v-u)*ap;
      if(c.atkType===1){ gripX=L(-16,16); gripY=L(-66,-40); swordAng=L(-2.9,0.3); }   // ТИП 2 — горизонтальный слэш (настрой углы сам)
      else             { gripX=L(14,4); gripY=L(-98,-26); swordAng=L(-2.5,0.5); }  // ТИП 1 — занос над головой -> удар сверху вниз
    }else if(c.afterAtk>0){                                       // возврат меча из удара в стойку (afterAtk 1->0)
      const ar=1-c.afterAtk, L=(u,v)=>u+(v-u)*ar;
      if(c.atkType===1){ gripX=L(16,18); gripY=L(-40,-42); swordAng=L(0.3,-0.7); }   // возврат типа 2
      else            { gripX=L(4,18);  gripY=L(-26,-42); swordAng=L(0.5,-0.7); }  // возврат типа 1
    }else{
      gripX=18; gripY=-42; swordAng=-0.7;                        // готовая стойка двумя руками
    }

    const cs=Math.cos(swordAng), sn=Math.sin(swordAng);
    bax=gripX-1*cs;  bay=gripY-1*sn;                            // ближняя рука у гарды
    fax=gripX-7*cs;  fay=gripY-7*sn;                            // дальняя рука ниже по рукояти
    baBend=9; faBend=-9;                                        // руки согнуты (локти в стороны)
  }
  // при ударе колени разгибаются и тело приподнимается, затем возврат
  let extend = 0;
  if(c.atk>0) extend = c.atk/ATK_DUR;   // быстро нарастает в начале свинга и держится
  const rise = 6*extend, hipDraw = hipY - rise;            // таз приподнимается -> ноги выпрямляются к тем же стопам
  blBend *= (1-extend); flBend *= (1-extend);              // колени разгибаются
  const leg=(hx,fx,fy,bend,plant)=>{
    limb(hx,hipDraw,fx,fy-13,bend,2,skin,OUT);             // нога от приподнятого таза (при ударе)
    // угол стопы: на земле (plant=1) — параллельно склону; в махе/воздухе — вдоль голени (касательная)
    const vx=fx-hx, vy=(fy-13)-hipY, Ll=Math.hypot(vx,vy)||1, nlx=-vy/Ll, nly=vx/Ll;
    const ccx=(hx+fx)/2+nlx*bend, ccy=(hipY+(fy-13))/2+nly*bend;
    const legAng = Math.atan2(-(fx-ccx),(fy-13)-ccy);                          // вдоль голени
    const wx = c.x + c.facing*fx;
    const groundAng = Math.atan((terrain(wx+3)-terrain(wx-3))/6) * c.facing;   // параллельно земле под стопой
    const footAng = clamp(legAng*(1-plant) + groundAng*plant, -1.1, 1.1);
    ctx.save();
    ctx.translate(fx,fy-13); ctx.rotate(footAng); ctx.translate(4,13); // поворот вокруг щиколотки
    bodyRR(-6,-9,7,2,2, sock, OUT);                       // белый носок
    bodyRR(-6,-4,12,3,3, shoe, OUT);                       // чёрный ботинок
    ctx.restore();
  };
  const arm=(sx2,hx,hy,bend)=>{
    limb2(sx2,shY,hx,hy,bend,2,shirt,skin,OUT,0.4);};   // рукав (футболка) сверху + кожа снизу

  if(!isLeader) {
    ctx.save(); ctx.scale(c.facing,1); drawSword(-16,-72, 0.7, -1, 1); ctx.restore();   // меч за спиной - без зеркала при смене направления
    arm(shX, fax, fay, faBend);   // дальняя рука за корпусом (когда меч за спиной)
  }

  leg( hipX, flx, fly, flBend, flPlant);          // дальняя нога
  leg(-hipX, blx, bly, blBend, blPlant);    // ближняя нога

  // наклон штанин = направление соответствующей ноги (шаг + прыжок)
  const pantA=(fx,hx,fyv)=> clamp(Math.atan2(-(fx-hx),(fyv-13)-hipY)*0.7,-0.6,0.6);
  const angL=pantA(blx,-hipX,bly), angR=pantA(flx,hipX,fly);

  // наклон корпуса: с мечом - немного назад; при ударе - сначала назад, потом вперёд
  let lean = 0;
  if(isLeader){ lean = -0.12; if(c.atk>0){ const ap2=1-c.atk/ATK_DUR; lean = -0.2 + 0.5*ap2; } else if(c.afterAtk>0){ lean = -0.12 + 0.42*c.afterAtk; } }
  ctx.save(); ctx.translate(0,-28-rise); ctx.rotate(lean); ctx.translate(0,28);   // наклон + подъём верхней части вокруг бёдер
  capRR(-13,-46,26,15,3, shorts, OUT, true, 3, 0.88 + 0.15 * angL, angL, angR);    // шорты: штанины наклоняются за ногами
  capRR(-14,-90,26,32,11, hat, OUT, false, 2, 0.9);   // шапка-прямоугольник с ушками
  archRR(-13,-65,26,24,1, 2, shirt, OUT);    // футболка — верх/низ дугами вниз (5 = прогиб)
  if(isLeader) arm(shX, fax, fay, faBend);    // дальняя рука к рукояти (двумя руками, перед телом)

  blob(1,-76,10, skin, OUT, 0.7);                  // лицо
  blob(-3,-78,1.0,'#22303f',null); blob(8,-78,1.0,'#22303f',null);  // глаза
  ctx.strokeStyle='#22303f'; ctx.lineWidth=1.0; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(1.0,-73.5); ctx.quadraticCurveTo(4,-72.6,7,-73.5); ctx.stroke();  // спокойный рот

  if(isLeader) {
    k= c.atk/ATK_DUR
    back = c.afterAtk

    lenK = k > 0 ? 1 - Math.abs(0.5 - k) : back > 0 ? (1 - back * 0.5) :1
    perspective = (k > 0) && (c.atkType == 1) ? (1-k) : k
    drawSword(gripX, gripY, swordAng, perspective , lenK);  // меч двумя руками
  }
  arm(-shX, bax, bay, baBend);                // ближняя рука к рукояти
  ctx.restore();   // конец наклона корпуса
 
}

// Джейк — тело-прямоугольник, конечности и анимация как у Финна (жёлтый, без обуви), круглые уши, крупные глаза
function drawJake(c){
  ctx.translate(0,10)
  const body='#f2b63e', OUT=OUTLINE;
  const p=c.walk, mv=c.moving, air=c.grounded?0:1;
  const stride=c.stepLen*mv, lift=7*mv, asw=8*mv;
  const hipY=-24, hipX=8, shY=-50, shX=15;

  let blx,bly, flx,fly, bax,bay, fax,fay, baBend, faBend, blBend, flBend;

  if(air){
    const LEG=18, ARM=20;                                  // натуральные длины — конечности не укорачиваются
    const tb=-0.5, tf=0.3;                                 // углы ног в прыжке
    blx=-hipX+LEG*Math.sin(tb); bly=hipY+LEG*Math.cos(tb);
    flx= hipX+LEG*Math.sin(tf); fly=hipY+LEG*Math.cos(tf);
    const ab=-2.7, af=2.7;                                 // руки вверх-в стороны
    bax=-shX+ARM*Math.sin(ab); bay=shY-ARM*Math.cos(ab);
    fax= shX+ARM*Math.sin(af); fay=shY-ARM*Math.cos(af);
    baBend=-3; faBend=3; blBend=-6; flBend=-6;             // колени согнуты
  }else{
    blx=-hipX+footX(p,stride);             bly=-Math.max(0,Math.sin(p))*lift;
    flx= hipX+footX(p+Math.PI,stride);     fly=-Math.max(0,Math.sin(p+Math.PI))*lift;
    bly += terrain(c.x + c.facing*blx) - c.y -5;   // стопа на реальную землю под ней (наклон)
    fly += terrain(c.x + c.facing*flx) - c.y -5;
    const sb= Math.cos(p)*asw, sf=-Math.cos(p)*asw;       // руки маятником в противофазе ногам
    bax=-shX-1+sb;  bay=-26 - Math.max(0,sb)*0.45;
    fax= shX+1+sf;  fay=-26 - Math.max(0,sf)*0.45;
    baBend=sb*0.25; faBend=sf*0.25;                        // локоть отстаёт за махом
    blBend=-4-5*mv*Math.max(0,Math.sin(p));                // колено сгибается в фазе подъёма
    flBend=-4-5*mv*Math.max(0,Math.sin(p+Math.PI));
  }

  const leg=(hx,fx,fy,bend)=>{ limb(hx,hipY,fx,fy,bend,2,body,OUT); };   // нога как у Финна, без ботинка/носка
  const arm=(sx2,hx,hy,bend)=>{ limb(sx2,shY,hx,hy,bend,2,body,OUT); };  // рука как у Финна, одним цветом

  arm(shX, fax, fay, faBend);                 // дальняя рука (за корпусом)
  leg(-hipX, blx, bly, blBend);               // дальняя нога
  leg( hipX, flx, fly, flBend);               // ближняя нога

  blob(-12,-62,5, body, OUT);                 // круглое ухо слева (до тела — корпус скроет внутренний шов)
  blob( 12,-62,5, body, OUT);                 // круглое ухо справа
  bodyRR(-15,-70,30,46,15, body, OUT);        // тело + голова — скруглённый прямоугольник
  arm(-shX, bax, bay, baBend);                // ближняя рука (перед корпусом)

  const eyeR = 4.8
  blob(-7,-56,eyeR,'#22303f',OUT); blob(8,-56,eyeR,'#22303f',OUT);              // крупные глаза: белый круг
  blob(-6,-55.5,eyeR-0.2, '#fff',null); blob(9,-55.5,eyeR-0.2,'#fff',null);  // чёрный зрачок поверх

  limb(-4,-45, 6,-45, -10, 4, body, OUT);                              // морда — полуарка (как маленький limb) вокруг рта
  ctx.strokeStyle=OUT; ctx.lineWidth=1.4; ctx.lineCap='round';
  blob(1,-47,2,'#23232a',OUT,0.667);                                   // чёрный нос — эллипс 3×2
}

// прямоугольник со скруглёнными ТОЛЬКО верхними углами (тело банана)
function roundTopRR(x,y,w,h,r,color,oc){
  r=Math.min(r,w/2,h);
  ctx.beginPath();
  ctx.moveTo(x,y+h);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h);
  ctx.closePath();
  if(oc){ ctx.lineWidth=OUTLINE_W; ctx.strokeStyle=oc; ctx.stroke(); }
  ctx.fillStyle=color; ctx.fill();
}
// зомби-банан: конечности как у Джейка, руки вытянуты вперёд, злая морда
function drawBanana(c){
  const s=c.scale||1;
  ctx.scale(s,s);                                            // размер зомби (2x + рандом)
  ctx.translate(0,2); ctx.rotate(0.16); ctx.translate(0,-2); // тело наклонено чуть вперёд (вокруг стоп)
  const ow=OUTLINE_W; OUTLINE_W=ow/s;                        // обводка НЕ масштабируется (тело — да)
  const body=c.color||'#c7d15a', OUT=OUTLINE, W2=2;
  const p=c.walk, sway=Math.sin(T*2.2 + c.x*0.1)*1.4;        // покачивание рук
  const shY=-38, shX=11, hipY=-18, hipX=6, lift=4;
  const blx=-hipX+footX(p, BANANA_STRIDE),         bfy=2-Math.max(0,Math.sin(p))*lift;        // опора линейно назад -> не скользит
  const flx= hipX+footX(p+Math.PI, BANANA_STRIDE), ffy=2-Math.max(0,Math.sin(p+Math.PI))*lift;
  limb(shX, shY, 28, shY-3+sway, 2, W2, body, OUT);          // дальняя рука вперёд (за телом)
  limb(-hipX, hipY, blx, bfy, -2, W2, body, OUT);            // дальняя нога
  limb( hipX, hipY, flx, ffy,  2, W2, body, OUT);            // ближняя нога
  roundTopRR(-12,-58,24,46,12, body, OUT);                   // тело: скруглён только верх
  limb(-shX * 0.5 , shY+2, 27, shY+4+sway, -2, W2, body, OUT);        // ближняя рука вперёд (перед телом)
  blob(2,-48,1,'#00c000',null); blob(9,-48,1,'#00c000',null);   // глаза-точки (как у Финна)
  blob(3,-42,2,'#000000',null);  // злой оскал
  OUTLINE_W=ow;                                              // вернуть толщину обводки
}
function drawChar(c,isLeader){
  const sx=c.x-camX, sy=c.y;
  const air = c.grounded?0:clamp((terrain(c.x)-c.y)/120,0,1);

  // тень
  ctx.save();
  ctx.globalAlpha=0.5*(1-air*0.7);
  ctx.fillStyle='#10400f';
  const shAng=Math.atan((terrain(c.x+4)-terrain(c.x-4))/8);     // наклон тени = наклон земли по x
  const shS=c.scale||1; ctx.beginPath(); ctx.ellipse(sx, terrain(c.x)+4, (20-air*8)*shS, (4-air*1.5)*shS, shAng, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // тело (покачивание при ходьбе; без деформации в прыжке)
  ctx.save();
  ctx.translate(sx,sy);
  const bob = (c.grounded && c.moving>0.1) ? -Math.abs(Math.sin(c.walk))*3 : 0;  // покачивание только при ходьбе
  ctx.translate(0,bob);
  ctx.scale(c.facing,1);
  if(c.type==='finn') drawFinn(c, isLeader); else if(c.type==='banana') drawBanana(c); else drawJake(c);
  ctx.restore();

  // указатель «ведущий» (экранные координаты, без зеркала)
  if(isLeader){
    const topY = c.type==='finn' ? sy-102 : sy-82;
    const by = topY-14 + Math.sin(T*4)*4;
    ctx.fillStyle='#ffd34d'; ctx.strokeStyle='#9a6b00'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx-7,by); ctx.lineTo(sx+7,by); ctx.lineTo(sx,by+9); ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
}

// ---------- фон и земля ----------
let sky=ctx.createLinearGradient(0,0,0,H);
sky.addColorStop(0,'#5cc6ef'); sky.addColorStop(0.6,'#bfeaff'); sky.addColorStop(1,'#e9fbff');

function drawCloud(c){
  const s=c.s;
  ctx.save();
  ctx.beginPath();
  for(const lb of c.lobes){                              // все доли в один путь → единый силуэт
    const cx=c.x +lb.dx*s, cy=c.y+lb.dy*s, rx=lb.rx*s, ry=lb.ry*s;
    ctx.moveTo(cx+rx, cy);
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  }
  ctx.lineWidth=OUTLINE_W; ctx.strokeStyle=OUTLINE; ctx.stroke();   // чёрная обводка силуэта
  ctx.fillStyle='#fbfdff'; ctx.fill();                             // заливка поверх скрывает внутренние швы
  ctx.restore();
}
function drawHillLayer(fn,parallax,color){
  ctx.beginPath(); ctx.moveTo(0,H);
  for(let sx=0;sx<=W;sx+=10) ctx.lineTo(sx, fn(sx+camX*parallax));
  ctx.lineTo(W,H); ctx.closePath(); ctx.fillStyle=color; ctx.fill();
}
function drawGround(){
  const pts=[];
  for(let sx=-6;sx<=W+6;sx+=6) pts.push([sx,terrain(sx+camX)]);

  // зелёная земля (без коричневого), заливка вниз до края
  ctx.beginPath(); ctx.moveTo(pts[0][0],H);
  for(const p of pts) ctx.lineTo(p[0],p[1]);
  ctx.lineTo(pts[pts.length-1][0],H); ctx.closePath();
  ctx.fillStyle='#5fb83f'; ctx.fill();

  // чёрный контур по поверхности земли
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(const p of pts) ctx.lineTo(p[0],p[1]);
  ctx.lineWidth=1; ctx.strokeStyle=OUTLINE; ctx.stroke();
}
// трава — три параллельные вертикальные тёмно-зелёные полоски, разбросаны по всей плоскости земли
function drawGrass(){
  ctx.strokeStyle='#2e7a2b'; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath();
  for(const g of grass){
    const sx=g.x-camX; if(sx<-10||sx>W+10) continue;
    const h=6*g.size, d=5*g.size;
    ctx.moveTo(sx-d, g.y); ctx.lineTo(sx-d, g.y-h);    // три параллельные полоски
    ctx.moveTo(sx,   g.y); ctx.lineTo(sx,   g.y-h);
    ctx.moveTo(sx+d, g.y); ctx.lineTo(sx+d, g.y-h);
  }
  ctx.stroke();
}


// ---------- цикл ----------
function update(dt){
  if(justPressed['KeyX']){ const t=leader; leader=follower; follower=t; }
  stepChar(leader,   leaderIntent(),            dt);
  stepChar(follower, followIntent(follower,leader), dt);

  camTargetX = clamp(leader.x - W/2, 0, LEVEL_W-W);
  camX += (camTargetX-camX)*Math.min(1,dt*6);

  for(const cl of clouds){ cl.x-=cl.spd*dt; if(cl.x<-200) cl.x=W+200; }
  bananaTimer -= dt;
  if(bananaTimer<=0){ spawnBanana(); bananaTimer = 1.4 + Math.random()*2.2; }
  for(const b of bananas){
    b.x -= b.speed*dt; b.y = terrain(b.x); b.walk += b.speed*dt*Math.PI/(2*BANANA_STRIDE*b.scale);   // шаг = путь -> без проскальзывания
    const ms=Math.min(b.scale,1.8);
    if(Math.random()<dt*3.4) stink.push({ x:b.x+(Math.random()-0.5)*18*b.scale, y:b.y-(18+Math.random()*32)*b.scale, vx:(Math.random()-0.5)*8, vy:-26-Math.random()*18, r:(3+Math.random()*10)*ms, life:1.4+Math.random()*0.8, grow:9+Math.random()*7 });   // пар-вонь
  }
  bananas = bananas.filter(b => b.x > camX - 70);   // ушли за левый край -> уничтожить
  if(leader.type==='finn' && leader.atk>0 && leader.atk<ATK_DUR*0.7 && !leader.atkHit){   // удар мечом разрубает зомби
    leader.atkHit=true;
    for(let i=bananas.length-1;i>=0;i--){ const b=bananas[i], dx=(b.x-leader.x)*leader.facing;
      if(dx>-15 && dx<100){ cutZombie(b); bananas.splice(i,1); } }
  }
  for(const pc of pieces){ pc.vy+=GRAV*dt; pc.x+=pc.vx*dt; pc.y+=pc.vy*dt; pc.rot+=pc.rotV*dt; pc.life-=dt; }
  pieces = pieces.filter(pc => pc.life>0 && pc.y<H+260);
  for(const j of juice){ j.vy+=GRAV*dt; j.x+=j.vx*dt; j.y+=j.vy*dt; j.life-=dt; }
  juice = juice.filter(j => j.life>0);
  for(const s of stink){ s.x+=s.vx*dt; s.y+=s.vy*dt; s.r+=s.grow*dt; s.life-=dt; }
  stink = stink.filter(s => s.life>0 && s.x>camX-100);
  justPressed={};
}
// строки watch внизу экрана
function drawWatch(){
  const keys=Object.keys(_watch);
  if(!keys.length) return;
  const lines=keys.map(k=>{
    let v=_watch[k];
    if(typeof v==='number') v = Number.isInteger(v)? v : +v.toFixed(3);
    else if(v && typeof v==='object') v = JSON.stringify(v);
    return k+' = '+v;
  });
  ctx.save();
  ctx.font='13px Consolas,monospace';
  const pad=7, lh=16;
  let wMax=0; for(const s of lines) wMax=Math.max(wMax, ctx.measureText(s).width);
  const boxW=wMax+pad*2, boxH=lines.length*lh+pad*2, bx=8, by=H-boxH-8;
  fillRR(bx,by,boxW,boxH,6,'rgba(10,16,28,0.72)');
  ctx.fillStyle='#7cf2a6'; ctx.textAlign='left'; ctx.textBaseline='top';
  lines.forEach((s,i)=> ctx.fillText(s, bx+pad, by+pad+i*lh));
  ctx.restore();
}

function render(){
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  for(const cl of clouds) drawCloud(cl);
  drawHillLayer(farHill,0.30,'#b9d6cf');
  drawHillLayer(midHill,0.55,'#8fc77c');
  drawGround();
  drawGrass();
  for(const s of stink) drawStink(s);
  for(const b of bananas) drawChar(b,false);
  for(const pc of pieces) drawZombieHalf(pc);
  drawChar(follower,false);
  drawChar(leader,true);
  for(const j of juice) drawJuice(j);
  drawWatch();
}

let last=performance.now();
function frame(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now; T+=dt;
  _watch={}; _watchN=0;          // сброс watch-значений каждый кадр
  update(dt); render();
  requestAnimationFrame(frame);
}

camX = camTargetX = clamp(leader.x - W/2, 0, LEVEL_W-W);

addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(!keys[e.code]) justPressed[e.code]=true;
  keys[e.code]=true;
});
addEventListener('keyup',e=>{ keys[e.code]=false; });
addEventListener('blur',()=>{ for(const k in keys) keys[k]=false; });

requestAnimationFrame(frame);
</script>
<script>
"use strict";
(function(){
  const body=document.body;
  function enableTouch(){ if(!body.classList.contains('touch')) body.classList.add('touch'); }
  try{ if(window.matchMedia && matchMedia('(pointer:coarse)').matches) enableTouch(); }catch(e){}

  function key(t,code){ window.dispatchEvent(new KeyboardEvent(t,{code:code})); }

  function bind(el){
    const code=el.getAttribute('data-k'); let on=false;
    const dn=function(e){ if(e){ if(e.cancelable)e.preventDefault(); e.stopPropagation(); } enableTouch(); if(on)return; on=true; el.classList.add('on'); key('keydown',code); };
    const up=function(e){ if(e){ if(e.cancelable)e.preventDefault(); e.stopPropagation(); } if(!on)return; on=false; el.classList.remove('on'); key('keyup',code); };
    el.addEventListener('touchstart',dn,{passive:false});
    el.addEventListener('touchend',up,{passive:false});
    el.addEventListener('touchcancel',up,{passive:false});
    el.addEventListener('mousedown',dn);
    window.addEventListener('mouseup',up);
  }
  Array.prototype.forEach.call(document.querySelectorAll('#touch .btn'), bind);

  document.addEventListener('touchstart', function(){ enableTouch(); }, {passive:true});
  window.addEventListener('orientationchange', function(){ setTimeout(function(){ window.dispatchEvent(new Event('resize')); },300); });
})();
</script>
